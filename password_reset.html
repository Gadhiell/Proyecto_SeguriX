<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña - SeguriX</title>

    <link rel="stylesheet" href="/static/styles.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        .requirements {
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .requirement {
            color: red;
            margin: 5px 0;
            transition: 0.2s;
        }

        .valid {
            color: limegreen;
        }

        .invalid {
            color: red;
        }

    </style>

</head>
<body>

<div class="login-page">

    <!-- LADO IZQUIERDO -->
    <div class="login-left">

        <img src="/static/logo.png" class="login-logo">
        <img src="/static/Wordmark.png" class="login-wordmark">

    </div>

    <!-- CARD -->
    <div class="login-card">

        <!-- VOLVER -->
        <a href="/login" class="back-button">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h1>NUEVA CONTRASEÑA</h1>

        <form onsubmit="return validarPasswords()">

            <!-- NUEVA PASSWORD -->
            <div class="input-group">

                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                </div>

                <input
                type="password"
                id="password1"
                placeholder="Nueva contraseña"
                onkeyup="validarCondiciones()"
                required>

            </div>

            <!-- REQUISITOS -->
            <div class="requirements">

                <p><strong>La contraseña debe tener:</strong></p>

                <p id="length" class="requirement invalid">
                    ❌ Mínimo 8 caracteres
                </p>

                <p id="uppercase" class="requirement invalid">
                    ❌ Al menos 1 mayúscula
                </p>

                <p id="lowercase" class="requirement invalid">
                    ❌ Al menos 1 minúscula
                </p>

                <p id="number" class="requirement invalid">
                    ❌ Al menos 1 número
                </p>

            </div>

            <!-- CONFIRMAR PASSWORD -->
            <div class="input-group">

                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                </div>

                <input
                type="password"
                id="password2"
                placeholder="Confirmar contraseña"
                required>

            </div>

            <!-- ERROR -->
            <p id="error-password" class="error-text"></p>

            <!-- BOTON -->
            <button type="submit" class="login-btn">
                CONFIRMAR
            </button>

        </form>

    </div>

</div>

<script>

function validarCondiciones() {

    const password = document.getElementById("password1").value;

    // CONDICIONES
    const tiene8 = password.length >= 8;
    const tieneMayus = /[A-Z]/.test(password);
    const tieneMinus = /[a-z]/.test(password);
    const tieneNumero = /[0-9]/.test(password);

    actualizarEstado("length", tiene8);
    actualizarEstado("uppercase", tieneMayus);
    actualizarEstado("lowercase", tieneMinus);
    actualizarEstado("number", tieneNumero);
}

function actualizarEstado(id, valido) {

    const elemento = document.getElementById(id);

    if (valido) {

        elemento.classList.remove("invalid");
        elemento.classList.add("valid");

        elemento.innerHTML = elemento.innerHTML.replace("❌", "✅");

    } else {

        elemento.classList.remove("valid");
        elemento.classList.add("invalid");

        elemento.innerHTML = elemento.innerHTML.replace("✅", "❌");
    }
}

function validarPasswords() {

    const pass1 = document.getElementById("password1").value;
    const pass2 = document.getElementById("password2").value;

    const error = document.getElementById("error-password");

    // VALIDACIONES
    const tiene8 = pass1.length >= 8;
    const tieneMayus = /[A-Z]/.test(pass1);
    const tieneMinus = /[a-z]/.test(pass1);
    const tieneNumero = /[0-9]/.test(pass1);

    if (!tiene8 || !tieneMayus || !tieneMinus || !tieneNumero) {

        error.innerText = "La contraseña no cumple los requisitos";
        return false;
    }

    if (pass1 !== pass2) {

        error.innerText = "Las contraseñas no coinciden";
        return false;
    }

    // REDIRIGE AL LOGIN
    window.location.href = "/login";

    return false;
}

</script>

</body>
</html>
