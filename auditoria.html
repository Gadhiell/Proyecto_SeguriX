<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Auditoría - SeguriX</title>

    <link rel="stylesheet"
    href="/static/Styles.css">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <script src="/dashboard.js"></script>

</head>
<body>

<!-- CONTENIDO -->
<div class="panel-container">


    <!-- HEADER -->
    <div class="audit-header">

        <div>

            <h1 class="audit-title">
                Registro de Auditoría Centralizado
            </h1>

        </div>


        <div class="audit-total">

            <span id="total-registros">
                0 Entradas Procesadas
            </span>

        </div>

    </div>



    <!--FILTROS-->
    <form id="audit-form"
    method="GET"
    action="/auditoria"
    class="audit-filters">


        <!-- FECHAS -->
        <select name="fecha"
        class="filter-select">

            <option value="todos">
                Fechas (Rangos)
            </option>

            <option value="hoy">
                Hoy
            </option>

            <option value="semana">
                Últimos 7 días
            </option>

            <option value="mes">
                Últimos 30 días
            </option>

        </select>



        <!-- TIPO -->
        <select name="tipo"
        class="filter-select">

            <option value="todos">
                Tipo Usuario (Todos)
            </option>

            <option value="Empleado">
                Empleado
            </option>

            <option value="Proveedor">
                Proveedor
            </option>

            <option value="Visitante">
                Visitante
            </option>

        </select>



        <!-- METODO -->
        <select name="metodo"
        class="filter-select">

            <option value="todos">
                Métodos (Todos)
            </option>

            <option value="Código QR">
                Código QR
            </option>

            <option value="Tarjeta">
                Tarjeta
            </option>

            <option value="Huella Digital">
                Huella Digital
            </option>

        </select>



        <!-- UBICACION -->
        <select name="ubicacion"
        class="filter-select">

            <option value="todos">
                Ubicación (Todas)
            </option>

            <option value="Vestíbulo">
                Vestíbulo
            </option>

            <option value="Entrada Lateral">
                Entrada Lateral
            </option>

            <option value="Entrada principal">
                Entrada principal
            </option>

            <option value="Bodega">
                Bodega
            </option>

            <option value="Oficina">
                Oficina
            </option>

        </select>



        <!-- ESTADO -->
        <select name="estado"
        class="filter-select">

            <option value="todos">
                Estado (Todos)
            </option>

            <option value="ACTIVO">
                Activo
            </option>

            <option value="INACTIVO">
                Inactivo
            </option>

        </select>



        <button type="button" id="reset-filters-btn" class="filter-submit hidden">Revertir Cambios</button>
    </form>



    <!-- TABLA -->
    <div class="tabla-container audit-table-container">


        <!-- HEADER TABLA -->
        <div class="table-header">

            <div>

                <h2>
                    Accesos Registrados
                </h2>

                <p class="table-subtitle">

                    Últimos eventos detectados
                    por el sistema de control

                </p>

            </div>

        </div>



        <!-- TABLA -->
        <table>

            <thead>

                <tr>

                    <th>
                        Hora/Fecha
                    </th>

                    <th>
                        Usuario
                    </th>

                    <th>
                        Método
                    </th>

                    <th>
                        Ubicación
                    </th>

                    <th>
                        Estado
                    </th>

                </tr>

            </thead>



            <!-- CUERPO DINAMICO -->
            <tbody id="audit-body"></tbody>

        </table>

    </div>

    <style>
        .audit-filters {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .filter-select {
            min-width: 160px;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.06);
            background: transparent;
            font-weight: 600;
            color: inherit;
        }

        .hidden { display: none !important; }

        .tabla-container th, .tabla-container td { padding: 12px 14px; }
        .tabla-container table { margin-top: 6px; }
        .tabla-container tbody tr td.empty-row { padding: 24px 14px; color: #9ca3af; }

        .table-header h2 { margin: 0; }
        .table-subtitle { margin: 0; margin-top: 4px; color: #6b7280; line-height: 1.3; font-size: 0.95rem; }

        .audit-header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
        .audit-title { margin: 0 0 4px 0; font-size:1.35rem; }
        .audit-total { font-weight:600; color:#374151; }

        .panel-container { font-size: 14px; }
    </style>

    <script>

async function cargarAuditoria() {

    const fecha =
    document.querySelector(
        'select[name="fecha"]'
    ).value;

    const tipo =
    document.querySelector(
        'select[name="tipo"]'
    ).value;

    const metodo =
    document.querySelector(
        'select[name="metodo"]'
    ).value;

    const ubicacion =
    document.querySelector(
        'select[name="ubicacion"]'
    ).value;

    const estado =
    document.querySelector(
        'select[name="estado"]'
    ).value;

    const res = await fetch("/auditoria_datos");
    let logs = await res.json();


    if (metodo !== "todos") {
        logs = logs.filter(log => {
            const m = (log.metodo || '').toLowerCase();
            const filtro = metodo.toLowerCase();
            return m.includes(filtro) || filtro.includes(m.substring(0, 3));
        });
    }

    if (tipo !== "todos") {
        logs = logs.filter(log =>
            log.rol === tipo
        );
    }

    if (ubicacion !== "todos") {
        logs = logs.filter(log =>
            log.ubicacion === ubicacion
        );
    }

    if (estado !== "todos") {
        logs = logs.filter(log =>
            log.estado.toLowerCase() === estado.toLowerCase()
        );
    }

    if (fecha !== "todos") {
        const ahora = new Date();

        logs = logs.filter(log => {
            const partes =
            log.fecha.split(" ")[0].split("/");

            const fechaLog =
            new Date(
                partes[2],
                partes[1] - 1,
                partes[0]
            );

            const diferenciaDias =
            (ahora - fechaLog) /
            (1000 * 60 * 60 * 24);

            if (fecha === "hoy") {
                return diferenciaDias < 1;
            }

            if (fecha === "semana") {
                return diferenciaDias <= 7;
            }

            if (fecha === "mes") {
                return diferenciaDias <= 30;
            }

            return true;
        });
    }

    document.getElementById(
        "total-registros"
    ).textContent =
    `${logs.length} Entradas Procesadas`;

    const tabla =
    document.getElementById(
        "audit-body"
    );

    tabla.innerHTML = "";

    if (logs.length === 0) {
        tabla.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;">No hay registros que coincidan con los filtros.</td></tr>';
        return;
    }

    logs.forEach(log => {

        let claseEstado =
        log.estado === "activo"
        ? "badge activo"
        : "badge inactivo";

        let textoEstado =
        log.estado === "activo"
        ? "PERMITIDO"
        : "DENEGADO";

        tabla.innerHTML += `

        <tr>

            <td>${log.fecha}</td>

            <td>${log.nombre || 'Desconocido'} ${log.placeholder ? '<span class="placeholder-badge">placeholder</span>' : ''}</td>

            <td>${log.metodo || 'N/A'}</td>

            <td>${log.ubicacion || 'N/A'}</td>

            <td>

                <span class="${claseEstado}">
                    ${textoEstado}
                </span>

            </td>

        </tr>

        `;

    });

}


function inicializarFiltrosAuditoria() {
    const selects = document.querySelectorAll('.filter-select');
    selects.forEach(select => {
        select.addEventListener('change', () => {
            actualizarBotonReset();
            cargarAuditoria();
        });
    });

    const resetBtn = document.getElementById('reset-filters-btn');
    if (resetBtn) {
        resetBtn.addEventListener('click', () => {
            restablecerFiltros();
            cargarAuditoria();
        });
    }

    const form = document.getElementById('audit-form');
    if (form) {
        form.addEventListener('submit', event => {
            event.preventDefault();
            cargarAuditoria();
        });
    }
    actualizarBotonReset();
}

function obtenerEstadoFiltros() {
    const valores = Array.from(document.querySelectorAll('.filter-select')).map(select => select.value);
    return valores.some(valor => valor !== 'todos');
}

function actualizarBotonReset() {
    const resetBtn = document.getElementById('reset-filters-btn');
    if (!resetBtn) return;
    if (obtenerEstadoFiltros()) {
        resetBtn.classList.remove('hidden');
    } else {
        resetBtn.classList.add('hidden');
    }
}

function restablecerFiltros() {
    document.querySelectorAll('.filter-select').forEach(select => {
        select.value = 'todos';
    });
    actualizarBotonReset();
}

window.addEventListener('load', () => {
    inicializarFiltrosAuditoria();
    cargarAuditoria();
    setInterval(() => cargarAuditoria(), 5000);
});




</script>

</body>
</html>
