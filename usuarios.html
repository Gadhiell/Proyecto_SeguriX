<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Usuarios - SeguriX</title>

    <link rel="stylesheet" href="/static/Styles.css">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <script src="/dashboard.js"></script>

</head>
<body>

<!-- navbar inyectado por dashboard.js -->
<div class="panel-container">

    <div class="page-header">

        <h1>Administración de Usuarios</h1>

        <p>
            Gestión de usuarios, credenciales y permisos registrados en SeguriX.
        </p>

    </div>

    <div class="usuarios-toolbar">

        <div class="search-box">

            <i class="bi bi-search"></i>

            <input
            type="text"
            placeholder="Buscar usuario">

        </div>

        <button
        type="button"
        class="action-btn"
        onclick="abrirModal()">

            <i class="bi bi-person-plus-fill"></i>
            Nuevo Usuario

        </button>

    </div>

    <div class="tabla-container">

        <div class="table-header">

            <div>

                <h2>Usuarios Registrados</h2>

                <p class="table-subtitle">
                    Credenciales activas dentro del sistema.
                </p>

            </div>

        </div>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nombre</th>
                    <th>RUT</th>
                    <th>Rol</th>
                    <th>Método</th>
                    <th>Estado</th>

                </tr>

            </thead>

            <tbody id="tabla-usuarios"></tbody>

        </table>

    </div>

</div>

<div id="modalOverlay" class="modal-overlay">

    <div class="modal-usuario">

        <div class="modal-header">

            <h2>
                REGISTRAR NUEVO USUARIO - SMART ACCESS
            </h2>

        </div>

        <form
        id="usuarioForm"
        method="POST"
        action="/api/usuarios">

            <div class="modal-body">

                <div class="modal-left">

                    <div class="avatar-preview">

                        <i class="bi bi-person-fill"></i>

                    </div>

                    <label>Nombre Completo</label>

                    <input
                    type="text"
                    name="nombre"
                    required>

                    <label>RUT</label>

                    <input
                    type="text"
                    id="rut"
                    name="rut"
                    placeholder="12.345.678-9"
                    required>

                    <label>Empresa u Organización</label>

                    <input
                    type="text"
                    name="empresa">

                    <label>Email</label>

                    <input
                    type="email"
                    name="email">

                </div>

                <div class="modal-right">

                    <label>Método de Acceso</label>

                    <input
                    type="hidden"
                    id="metodo"
                    name="metodo"
                    required>


                    

                    <div class="metodos-acceso">

                        <button
                        type="button"
                        class="metodo-btn">

                            <i class="bi bi-qr-code-scan"></i>
                            Código QR

                        </button>

                        <button
                        type="button"
                        class="metodo-btn">

                            <i class="bi bi-fingerprint"></i>
                            Huella Digital

                        </button>

                        <button
                        type="button"
                        class="metodo-btn">

                            <i class="bi bi-credit-card-2-front-fill"></i>
                            Tarjeta

                        </button>

                    </div>

                    <label>Valor de Credencial</label>

                    <div class="credencial-box">

                        <input
                        type="text"
                        id="credencial"
                        name="credencial"
                        readonly>

                        <button
                        type="button"
                        class="secondary-btn"
                        onclick="generarCredencial()">
                            Regenerar
                        </button>

                    </div>

                    <div class="form-row">

                        <div>

                            <label>Rol de Usuario</label>

                            <select name="rol">

                                <option>Administrador</option>
                                <option>Empleado</option>
                                <option>Proveedor</option>
                                <option>Visitante</option>

                            </select>

                        </div>

                        <div>

                            <label>Fecha de Expiración</label>

                            <input
                            type="date"
                            name="expiracion"
                            required>
                        </div>

                    </div>

                    <label>Zonas Permitidas</label>

                    <input
                    type="text"
                    name="zonas"
                    placeholder="Entrada Principal, Bodega, Oficina">

                    <div class="modal-actions">

                        <button
                        type="button"
                        class="cancel-btn"
                        onclick="cerrarModal()">

                            Cancelar

                        </button>

                        <button
                        type="submit"
                        class="save-btn">

                            Guardar y Activar

                        </button>

                    </div>

                </div>

            </div>

        </form>

    </div>

</div>

<script>

function abrirModal() {
    resetearFormulario();

    document
    .getElementById("modalOverlay")
    .classList
    .add("active");
}

function cerrarModal() {
    document
    .getElementById("modalOverlay")
    .classList
    .remove("active");
    resetearFormulario();
}

function resetearFormulario() {
    const form = document.getElementById('usuarioForm');
    if (!form) return;
    form.reset();
    generarCredencial();
    if (botonesMetodo.length > 0) {
        seleccionarMetodo(botonesMetodo[0]);
    }
}

function generarCredencial() {

    const caracteres =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let hash = "SEC_";

    for(let i = 0; i < 16; i++) {

        hash += caracteres.charAt(

            Math.floor(
                Math.random() *
                caracteres.length
            )

        );

    }

    document
    .getElementById("credencial")
    .value = hash;

}

const botonesMetodo =
document.querySelectorAll(".metodo-btn");

function seleccionarMetodo(btn) {
    botonesMetodo.forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");

    const textoBtn = btn.textContent.trim();
    let metodoValue = textoBtn;

    if (textoBtn.includes("QR")) {
        metodoValue = "Código QR";
    } else if (textoBtn.includes("Huella")) {
        metodoValue = "Huella Digital";
    } else if (textoBtn.includes("Tarjeta")) {
        metodoValue = "Tarjeta";
    }

    document.getElementById("metodo").value = metodoValue;
}

botonesMetodo.forEach(btn => {
    btn.addEventListener("click", (e) => {
        e.preventDefault();
        seleccionarMetodo(btn);
    });
});

document
.getElementById("rut")
.addEventListener("blur", function() {

    const patron =
    /^\d{1,2}\.\d{3}\.\d{3}-[\dkK]$/;

    if (

        this.value !== "" &&
        !patron.test(this.value)

    ) {

        alert(
            "Formato válido: 12.345.678-9"
        );

        this.focus();

    }

});

document
.getElementById('usuarioForm')
.addEventListener('submit', async function(e) {
    e.preventDefault();

    const rut = document.getElementById('rut').value;
    const metodo = document.getElementById('metodo').value;
    const patron = /^\d{1,2}\.\d{3}\.\d{3}-[\dkK]$/;

    if (!patron.test(rut)) {
        alert('Ingrese un RUT válido.');
        return;
    }

    if (metodo === '') {
        alert('Seleccione un método de acceso.');
        return;
    }

    const form = e.target;
    const formData = new FormData(form);

    try {
        const res = await fetch(form.action, {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
            body: formData
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.error || 'No se pudo crear el usuario.');
            return;
        }

        cerrarModal();
        cargarUsuarios();

    } catch (err) {
        console.error('Error creando usuario:', err);
        alert('Ocurrió un error creando el usuario.');
    }
});


async function cargarUsuarios() {
    try {
        const res = await fetch("/api/usuarios");
        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const usuarios = await res.json();
        const tabla = document.getElementById("tabla-usuarios");

        if (!tabla) {
            return;
        }

        // almacenar usuarios para usar en la busqueda
        window.usuariosCache = usuarios;

        tabla.innerHTML = "";

        usuarios.forEach(usuario => {
            tabla.innerHTML += `
            <tr>
                <td>${usuario.id}</td>
                <td>${usuario.nombre}</td>
                <td>${usuario.rut}</td>
                <td>${usuario.rol}</td>
                <td>${usuario.metodo || 'N/A'}</td>
                <td>
                    <span class="badge ${usuario.activo ? 'activo' : 'inactivo'}">
                        ${usuario.activo ? 'ACTIVO' : 'INACTIVO'}
                    </span>
                </td>
            </tr>
            `;
        });

        if (usuarios.length === 0) {
            tabla.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">No hay usuarios registrados aún.</td></tr>';
        }
    } catch (err) {
        console.error('Error cargando usuarios:', err);
        const tabla = document.getElementById("tabla-usuarios");
        if (tabla) {
            tabla.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">Error cargando usuarios.</td></tr>';
        }
    }
}

// Funcion de búsqueda
(() => {
    const input = document.querySelector('.search-box input');
    if (!input) return;

    let timer = null;
    input.addEventListener('input', (e) => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            const q = (e.target.value || '').toLowerCase().trim();
            const usuarios = window.usuariosCache || [];

            const filtrados = usuarios.filter(u => {
                const nombre = (u.nombre || '').toLowerCase();
                const rut = (u.rut || '').toString();
                const email = (u.email || '').toLowerCase();
                return (
                    nombre.includes(q) ||
                    rut.includes(q) ||
                    email.includes(q)
                );
            });

            const tabla = document.getElementById('tabla-usuarios');
            tabla.innerHTML = '';

            filtrados.forEach(usuario => {
                tabla.innerHTML += `
                <tr>
                    <td>${usuario.id}</td>
                    <td>${usuario.nombre}</td>
                    <td>${usuario.rut}</td>
                    <td>${usuario.rol}</td>
                    <td>${usuario.metodo || 'N/A'}</td>
                    <td>
                        <span class="badge ${usuario.activo ? 'activo' : 'inactivo'}">
                            ${usuario.activo ? 'ACTIVO' : 'INACTIVO'}
                        </span>
                    </td>
                </tr>`;
            });

            if (filtrados.length === 0) {
                tabla.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">No hay usuarios que coincidan.</td></tr>';
            }
        }, 200);
    });
})();

// Recargar usuarios cuando el modal se cierra
const modalOverlay = document.getElementById('modalOverlay');
const observer = new MutationObserver(() => {
    if (!modalOverlay.classList.contains('active')) {
        setTimeout(() => cargarUsuarios(), 300);
    }
});
observer.observe(modalOverlay, { attributes: true, attributeFilter: ['class'] });

window.addEventListener('load', () => {
    // Inicializar solo las funciones de esta pagina
    cargarUsuarios();
});

</script>

</body>
</html>
